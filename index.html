<!DOCTYPE html><html><head><title>Spotify Auth Capture</title><style>body{font-family:system-ui;padding:2rem;max-width:600px;margin:0 auto}.code{background:#f5f5f5;padding:1rem;border-radius:8px;word-break:break-all;font-family:monospace}.error{color:#d32f2f}.success{color:#388e3c}</style></head><body><h1>Spotify Authorization Code</h1><div id="result">Loading...</div><script>const params=new URLSearchParams(window.location.search);const code=params.get('code');const error=params.get('error');const resultEl=document.getElementById('result');if(code){resultEl.innerHTML=`<div class="success"><strong>Success!</strong></div><p>Your authorization code:</p><div class="code">${code}</div><p>Copy this code and send it to Chase.</p>`}else if(error){resultEl.innerHTML=`<div class="error"><strong>Error: ${error}</strong></div>`}else{resultEl.innerHTML='<div class="error">No authorization code found in URL.</div>'}`</script></body></html>
